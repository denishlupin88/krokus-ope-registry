    .top-meta { margin: 0; color: var(--muted); font-size: 0.75rem; }

      overflow-x: auto; max-width: 100%;

      border-radius: 999px; padding: 2px 8px; font-size: 0.68rem;

    .pill b { font-size: 0.82rem; color: var(--accent); }
    .pill-muted { background: #f5f5f5; border-color: #e0e0e0; }

    .pill-warn { background: #ffebee; border-color: #ffcdd2; }
    .pill-warn b { color: #b00020; }
    .toolbar {

      font-weight: 700;
    }
    .toolbar .btn-save:hover { background: #43a047 !important; border-color: #43a047 !important; }
    .toolbar .btn-publish {
      background: #323694 !important; color: #fff !important; border-color: #323694 !important;
      font-weight: 700;
    }
    .toolbar .btn-publish:hover { background: #252a70 !important; border-color: #252a70 !important; }
    .toolbar .btn:hover { border-color: var(--accent); color: var(--accent); }
    .save-status { color: var(--muted); font-size: 0.78rem; min-width: 120px; }
    .save-status.ok { color: var(--green); font-weight: 600; }
    .save-status.err { color: #b00020; font-weight: 600; }
    .save-status.warn { color: #7a6200; font-weight: 600; }
    .table-area {
      flex: 1; min-height: 0; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: var(--shadow); overflow: hidden;

    .table-wrap {

      scrollbar-gutter: stable; scrollbar-width: thin;
      scrollbar-color: #c9007e #f1f1f1;

      border-radius: 8px; border: 3px solid #f1f1f1; min-height: 40px;
    }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: #a80069; }
    .table-wrap::-webkit-scrollbar-corner { background: #f1f1f1; }
    .table-wrap::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 0; }

-27", "Инициатор": "Баташова Оксана Пантелеевна", "Обращение": "Формула строки «Операционная деятельность» в выгруженной форме бюджета\nВ выгруженной форме бюджета по строке «Операционная деятельность» суммируются поступления и расходы. Ожидаемое поведение: расходы должны вычитаться из поступлений. Нужно определить корректный вариант: изменить формулу в программе или загружать расходы с минусом, проверив, не будет ли это считаться ошибкой.", "Описание работы / решение": "Внесена корректировка в настройку формы ввода: включен признак «Использовать коэффициенты статей бюджета». Документы перезаполнены в рабочей базе и на копии для обучения.", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-05-27", "Дата выполнения": "2026-05-27", "Оценка, ч": 1, "Комментарии / интеграционные заметки": "Завершено 27.05.2026. Исправление применено в рабочей базе и на учебной копии."}, {"№": 13, "Дата обращения": "2026-06-04", "Инициатор": "Замяткин Роман Владимирович", "Обращение": "Перенос признака АВАНС/ПОСТОПЛАТА из 1С КИТ в ЗРДС 1С БИТ\nНужно перенести признак АВАНС/ПОСТОПЛАТА из 1С КИТ в ЗРДС 1С БИТ ФИНАНС.", "Описание работы / решение": "В ЗРДС добавлены два типа платежа (аванс / постоплата).", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-06-04", "Дата выполнения": "2026-06-04", "Оценка, ч": 1, "Комментарии / интеграционные заметки": "На стороне КРОКУС (Арсений): задействовать реквизит при выгрузке из 1С КИТ. Ответ БИТ 04.06.2026."}, {"№": 14, "Дата обращения": "2026-06-04", "Инициатор": "Замяткин Роман Владимирович", "Обращение": "Не работает выбор необходимых документов в ЗРДС (1С БИТ)\nВ ЗРДС 1С БИТ ФИНАНС нельзя отметить галками необходимые документы — система не даёт выбрать.", "Описание работы / решение": "Направлено Арсению на проверку (ответ БИТ от 04.06.2026).", "Исполнитель": "КРОКУС", "Статус": "Выполнено", "Плановый срок": "2026-06-04", "Дата выполнения": "2026-06-04", "Оценка, ч": null, "Комментарии / интеграционные заметки": "Скриншот image001.png из письма."}, {"№": 15, "Дата обращения": "2026-06-04", "Инициатор": "Замяткин Роман Владимирович", "Обращение": "Контроль лимитов в 1С БИТ не срабатывает; унификация ЦФО КРОКУС\nКонтроль в 1С БИТ не срабатывает — сведения о лимитах и взаиморасчётах отключены. ЦФО выгружается из КИТ как «КРОКУС АО», лимиты введены по разным ЦФО: АО «КРОКУС» и КРОКУС АО.", "Описание работы / решение": "Создан документ установки контрольных значений (проводить после ввода плановых данных бюджета БДДС). Выдан доступ на просмотр вкладки «Контроль».", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-06-04", "Дата выполнения": "2026-06-04", "Оценка, ч": 1, "Комментарии / интеграционные заметки": "Скриншот image002.png. КРОКУС: согласовать единое наименование ЦФО в БИТ ФИНАНС для корректной выгрузки из 1С КИТ. Ответ БИТ 04.06.2026."}, {"№": 16, "Дата обращения": "2026-06-04", "Инициатор": "Задков Владимир Владимирович", "Обращение": "Сортировка статей бюджета по кодификатору и перезаполнение форм ввода\nВладимир: статьи в форме ввода бюджета не отсортированы по алфавиту/коду — как отсортировать?", "Описание работы / решение": "Добавлена сортировка по кодификатору в настройке формы. Для уже созданных документов — перевыбрать настройку формы. По согласованию с Владимиром перезаполнены все формы ввода бюджета в правильном порядке. В отчётах и новых формах ввода порядок — по кодификатору.", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-06-04", "Дата выполнения": "2026-06-04", "Оценка, ч": 3, "Комментарии / интеграционные заметки": "Чат Макс, 04.06.2026. Обсуждали: форма зачищает при выборе настройки; вариант выгрузки шаблона Excel — отклонён в пользу полной перезаливки."}, {"№": 17, "Дата обращения": "2026-06-08", "Инициатор": "Гришаев Арсений Анатольевич", "Обращение": "Шаблон Excel для загрузки — элементы нижнего уровня, без групп\nПри загрузке из Excel выбирают группы вместо элементов нижнего уровня (по проектам). Нужен шаблон с листовыми элементами, не группами.", "Описание работы / решение": "В работе. На форме ввода бюджета ограничение выбора уже сделано (КРОКУС). Остаётся: выгрузка шаблона Excel без групп. Вариант Владимира — колонка «кодификатор» для элементов.\n09.06. для групп в БИТ добавить в наименование текст Группа и проверить отбор при выгрузке шаблона, если не сработает - доработать процедуру выгрузки шаблоне", "Исполнитель": "БИТ", "Статус": "В работе", "Плановый срок": "2026-06-09", "Дата выполнения": null, "Оценка, ч": null, "Комментарии / интеграционные заметки": "Чат Макс. Арсений, Владимир Задков. Добавим доп реквизит который заполним при записи элемента? (согласовать на статусе 09.06.2026)"}, {"№": 18, "Дата обращения": "2026-06-08", "Инициатор": "Замяткин Роман Владимирович", "Обращение": "Согласование заявок из КИТ: Роман не видит заявку на визе\nВиза «Инициатор» с условием Исполнитель = текущий пользователь не срабатывает — исполнитель в заявке из КИТ пустой. Виза «Все пользователи» неактивна, Роман не видит заявку.", "Описание работы / решение": "Скорректирован маршрут согласования для заявок из КИТ: убрано согласование инициатором. Условие по полю «загружен из КИТ». Для заявок, создаваемых в БИТ, маршрут прежний. Проверены права на визу, Роману направлено письмо.", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-06-08", "Дата выполнения": "2026-06-08", "Оценка, ч": 1, "Комментарии / интеграционные заметки": "Чат Макс. Арсений, Владимир Задков. КРОКУС: при необходимости ответственный вручную проставляет исполнителя в заявке."}, {"№": 19, "Дата обращения": "2026-06-09", "Инициатор": "Замяткин Роман Владимирович", "Обращение": "Ошибка при согласовании реестра платежей", "Описание работы / решение": "Скорректирован алгоритм формирования ссылки на реестр оплат КРОКУС нв форме установки виз", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-06-09", "Дата выполнения": "2026-06-09", "Оценка, ч": 1, "Комментарии / интеграционные заметки": "письмо от Романа З, Васильковой Елены"}, {"№": 20, "Дата обращения": "2026-06-09", "Инициатор": "Замяткин Роман Владимирович", "Обращение": "Настройка маршрутов согласования реестров платежей", "Описание работы / решение": "09.06 направлены права на установку виз от Романа З.\nНастроены права на установку виз для 12 пользователей", "Исполнитель": "БИТ", "Статус": "Выполнено", "Плановый срок": "2026-06-09", "Дата выполнения": "2026-06-09", "Оценка, ч": 1, "Комментарии / интеграционные заметки": "письмо от Романа З, Васильковой Елены"}, {"№": 21, "Дата обращения": "2026-06-09", "Инициатор": "Задков Владимир Владимирович", "Обращение": "Дата желаемого платежа - автоматизировать при выгрузке (добавить в КИТ и выгружать и БИТ ФИНАНС)", "Описание работы / решение": null, "Исполнитель": "КРОКУС", "Статус": "В работе", "Плановый срок": "2026-06-16", "Дата выполнения": null, "Оценка, ч": null, "Комментарии / интеграционные заметки": null}], "columns": ["№", "Дата обращения", "Инициатор", "Обращение", "Описание работы / решение", "Исполнитель", "Статус", "Плановый срок", "Дата выполнения", "Оценка, ч", "Комментарии / интеграционные заметки"], "initiators": ["Баташова Оксана Пантелеевна", "Гришаев Арсений Анатольевич", "Задков Владимир Владимирович", "Замяткин Роман Владимирович", "Хлюпин Денис Сергеевич"]}</script>
  <script>
    const STATUS_OPTIONS = ["Новое", "В работе", "На уточнении", "Выполнено", "Отложено", "Снято"];
    const EXECUTOR_OPTIONS = ["БИТ", "КРОКУС"];
    const STATUS_CLASS = {
      "Новое": "st-new",
      "В работе": "st-progress",
      "На уточнении": "st-clarify",
      "Выполнено": "st-done",
      "Отложено": "st-hold",
      "Снято": "st-cancel",
    };
    const WIDE_FIELDS = new Set([
      "Обращение", "Описание работы / решение",
      "Комментарии / интеграционные заметки"
    ]);
    const HIDDEN_COLUMNS = new Set(["Описание / суть обращения", "Источник"]);
    const HOURS_COLUMN = "Оценка, ч";
    const HOURS_VISIBILITY_KEY = "krokus-registry-hours-visible";
    const VIEW_MODE = true;
    const CLIENT_PAGES_URL = "https://denishlupin88.github.io/krokus-ope-registry/";
    const DATE_FIELDS = new Set(["Дата обращения", "Плановый срок", "Дата выполнения"]);
    const COL_LABELS = {
      "Дата обращения": "Дата",
      "Описание работы / решение": "Решение",
      "Комментарии / интеграционные заметки": "Комментарии",
      "Плановый срок": "План",
      "Дата выполнения": "Выполнено",
      "Оценка, ч": "Часы",
    };

    let state = { meta: {}, appeals: [], columns: [] };
    let columns = [];
    let initiatorOptions = [];
    let apiAvailable = false;

    const rowsEl = document.getElementById("rows");
    const headerRowEl = document.getElementById("headerRow");
    const searchEl = document.getElementById("search");
    const statusFilterEl = document.getElementById("statusFilter");
    const executorFilterEl = document.getElementById("executorFilter");
    const saveStatusEl = document.getElementById("saveStatus");

    function emptyRow() {
      const row = {};
      columns.forEach(col => {
        if (col === "№") row[col] = null;
        else if (col === "Оценка, ч") row[col] = null;
        else row[col] = "";
      });
      return row;
    }

    function renumber() {
      state.appeals.forEach((row, idx) => { row["№"] = idx + 1; });
    }

    function normalizeValue(col, value) {
      if (value === "" || value === "—") return null;
      if (col === "Оценка, ч") {
        const n = Number(value);
        return Number.isFinite(n) ? n : null;
      }
      if (col === "№") {
        const n = Number(value);
        return Number.isFinite(n) ? n : null;
      }
      return value;
    }

    function getFieldValue(tr, col) {
      const field = tr.querySelector(`[data-field="${col}"]`);
      if (!field) return "";
      if (VIEW_MODE) return field.dataset.raw ?? field.textContent ?? "";
      return field.value ?? field.textContent ?? "";
    }

    function syncAppealDate(row) {
      if (!row["Дата обращения"]) {
        if (row["Дата выполнения"]) row["Дата обращения"] = row["Дата выполнения"];
        else if (row["Плановый срок"]) row["Дата обращения"] = row["Плановый срок"];
      }
      return row;
    }

    function collectRow(tr) {
      const row = {};
      columns.forEach(col => {
        if (!tr.querySelector(`[data-field="${col}"]`)) return;
        row[col] = normalizeValue(col, getFieldValue(tr, col));
      });
      return syncAppealDate(row);
    }

    function formatDisplayValue(col, value) {
      if (value === null || value === "") return "—";
      if (col === "Инициатор") return formatInitiator(value) || "—";
      if (DATE_FIELDS.has(col)) {
        const d = parseDateValue(value);
        if (d) return d.toLocaleDateString("ru-RU");
      }
      return String(value);
    }

    function syncStateFromDom() {
      const trs = rowsEl.querySelectorAll("tr");
      if (!trs.length) return;
      state.appeals = [...trs].map(collectRow);
      renumber();
    }

    function collectData() {
      syncStateFromDom();
      return {
        meta: {
          ...state.meta,
          updated: new Date().toISOString().slice(0, 10),
          initiators: getInitiatorOptions(),
        },
        appeals: state.appeals.map(row => ({ ...row })),
        columns,
        initiators: getInitiatorOptions(),
      };
    }

    function getInitiatorOptions() {
      const names = new Set(initiatorOptions);
      state.appeals.forEach(row => {
        if (row["Инициатор"]) names.add(String(row["Инициатор"]).trim());
      });
      return [...names].sort((a, b) => a.localeCompare(b, "ru"));
    }

    function formatInitiator(name) {
      if (!name) return "";
      const parts = String(name).trim().split(/\s+/);
      if (parts.length >= 2) {
        const surname = parts[0];
        const firstName = parts[1];
        return `${firstName} ${surname.charAt(0).toUpperCase()}.`;
      }
      return name;
    }

    function paintStatus(select) {
      select.className = "cell-select " + (STATUS_CLASS[select.value] || "st-default");
    }

    function makeSelect(col, value, options, extraClass = "", labelFn = null) {
      const select = document.createElement("select");
      select.className = "cell-select " + extraClass;
      select.dataset.field = col;
      if (labelFn && value) select.title = value;
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = "—";
      select.appendChild(empty);
      const unique = [...new Set(options)];
      if (value && !unique.includes(value)) unique.unshift(value);
      unique.forEach(opt => {
        const option = document.createElement("option");
        option.value = opt;
        option.textContent = labelFn ? labelFn(opt) : opt;
        option.title = opt;
        if (value === opt) option.selected = true;
        select.appendChild(option);
      });
      if (col === "Статус") {
        paintStatus(select);
        select.addEventListener("change", () => {
          paintStatus(select);
          applyFilters();
          updateStats();
        });
      } else {
        select.addEventListener("change", applyFilters);
      }
      return select;
    }

    function autoResizeTextarea(ta) {
      ta.style.height = "0px";
      ta.style.height = Math.max(28, ta.scrollHeight) + "px";
    }

    function bindTextarea(ta) {
      autoResizeTextarea(ta);
      ta.addEventListener("input", () => autoResizeTextarea(ta));
    }

    function resizeAllTextareas() {
      rowsEl.querySelectorAll(".cell-textarea").forEach(autoResizeTextarea);
    }

    function makeField(col, value) {
      const td = document.createElement("td");
      td.dataset.col = col;
      if (col === "№") {
        td.textContent = value ?? "—";
        return td;
      }
      if (VIEW_MODE) {
        const span = document.createElement("span");
        span.className = "cell-view";
        span.dataset.field = col;
        span.dataset.raw = value ?? "";
        if (col === "Статус") {
          span.classList.add("status-badge", STATUS_CLASS[value] || "st-default");
          span.textContent = value || "—";
        } else {
          span.textContent = formatDisplayValue(col, value);
        }
        td.appendChild(span);
        return td;
      }
      if (col === "Статус") {
        td.appendChild(makeSelect(col, value || "", STATUS_OPTIONS));
      } else if (col === "Исполнитель") {
        td.appendChild(makeSelect(col, value || "", EXECUTOR_OPTIONS));
      } else if (col === "Инициатор") {
        const initiatorSelect = makeSelect(col, value || "", getInitiatorOptions(), "", formatInitiator);
        initiatorSelect.addEventListener("change", () => {
          initiatorSelect.title = initiatorSelect.value || "";
        });
        td.appendChild(initiatorSelect);
      } else if (WIDE_FIELDS.has(col)) {
        const ta = document.createElement("textarea");
        ta.className = "cell-textarea";
        ta.dataset.field = col;
        ta.value = value ?? "";
        ta.rows = 1;
        bindTextarea(ta);
        td.appendChild(ta);
      } else {
        const input = document.createElement("input");
        input.className = "cell-input";
        input.dataset.field = col;
        input.type = DATE_FIELDS.has(col) ? "date" : (col === "Оценка, ч" ? "number" : "text");
        input.value = value ?? "";
        td.appendChild(input);
      }
      return td;
    }

    function renderHeader() {
      headerRowEl.innerHTML = "";
      columns.forEach(col => {
        const th = document.createElement("th");
        th.dataset.col = col;
        th.textContent = COL_LABELS[col] || col;
        th.title = col;
        headerRowEl.appendChild(th);
      });
      if (!VIEW_MODE) {
        const th = document.createElement("th");
        th.dataset.col = "actions";
        th.textContent = "×";
        headerRowEl.appendChild(th);
      }
    }

    function renderRows() {
      rowsEl.innerHTML = "";
      state.appeals.forEach((item, index) => {
        const tr = document.createElement("tr");
        tr.dataset.index = String(index);
        columns.forEach(col => {
          tr.appendChild(makeField(col, item[col]));
        });
        if (!VIEW_MODE) {
          const actions = document.createElement("td");
          actions.dataset.col = "actions";
          const del = document.createElement("button");
          del.type = "button";
          del.className = "btn-icon";
          del.title = "Удалить";
          del.textContent = "×";
          del.addEventListener("click", () => {
            syncStateFromDom();
            state.appeals.splice(index, 1);
            renumber();
            renderRows();
            updateStats();
            applyFilters();
          });
          actions.appendChild(del);
          tr.appendChild(actions);
        }
        rowsEl.appendChild(tr);
      });
      resizeAllTextareas();
      updateStats();
      applyFilters();
    }

    function startOfDay(date = new Date()) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function parseDateValue(value) {
      if (!value) return null;
      const d = new Date(String(value) + "T00:00:00");
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function isTodayDate(value) {
      const d = parseDateValue(value);
      if (!d) return false;
      return d.getTime() === startOfDay().getTime();
    }

    function isWithinLastDays(value, days) {
      const d = parseDateValue(value);
      if (!d) return false;
      const today = startOfDay();
      const from = new Date(today);
      from.setDate(from.getDate() - (days - 1));
      return d >= from && d <= today;
    }

    function isOverdueRow(row) {
      const plan = row["Плановый срок"];
      if (!plan) return false;
      if (["Выполнено", "Снято"].includes(row["Статус"])) return false;
      const d = parseDateValue(plan);
      if (!d) return false;
      return d < startOfDay();
    }

    function updateStats() {
      const rows = [...rowsEl.querySelectorAll("tr")].map(collectRow);
      const done = rows.filter(r => r["Статус"] === "Выполнено").length;
      const open = rows.filter(r => ["В работе", "Новое", "На уточнении"].includes(r["Статус"])).length;
      const today = rows.filter(r => isTodayDate(r["Дата обращения"])).length;
      const week = rows.filter(r => isWithinLastDays(r["Дата обращения"], 7)).length;
      const overdue = rows.filter(isOverdueRow).length;
      document.getElementById("statTotal").textContent = String(rows.length);
      document.getElementById("statDone").textContent = String(done);
      document.getElementById("statOpen").textContent = String(open);
      document.getElementById("statToday").textContent = String(today);
      document.getElementById("statWeek").textContent = String(week);
      document.getElementById("statOverdue").textContent = String(overdue);
      document.getElementById("updatedAt").textContent = new Date().toISOString().slice(0, 10);
      if (state.meta?.title) document.getElementById("pageTitle").textContent = state.meta.title;
    }

    function applyFilters() {
      const q = searchEl.value.trim().toLowerCase();
      const status = statusFilterEl.value;
      const executor = executorFilterEl.value;
      [...rowsEl.querySelectorAll("tr")].forEach(tr => {
        const text = tr.textContent.toLowerCase();
        const statusVal = getFieldValue(tr, "Статус");
        const execVal = getFieldValue(tr, "Исполнитель");
        const okSearch = !q || text.includes(q);
        const okStatus = !status || statusVal === status;
        const okExecutor = !executor || execVal === executor;
        tr.classList.toggle("hidden", !(okSearch && okStatus && okExecutor));
      });
    }

    function isHoursColumnVisible() {
      if (VIEW_MODE) return false;
      return localStorage.getItem(HOURS_VISIBILITY_KEY) === "1";
    }

    function applyHoursColumnVisibility() {
      document.body.classList.toggle("hours-col-hidden", !isHoursColumnVisible());
    }

    function toggleHoursColumn() {
      const visible = !isHoursColumnVisible();
      localStorage.setItem(HOURS_VISIBILITY_KEY, visible ? "1" : "0");
      applyHoursColumnVisibility();
    }

    function bindCrocusSecretToggle() {
      let clicks = 0;
      let timer = null;
      document.getElementById("logoCrocus").addEventListener("click", () => {
        if (VIEW_MODE) return;
        clicks += 1;
        clearTimeout(timer);
        timer = setTimeout(() => { clicks = 0; }, 700);
        if (clicks >= 3) {
          clicks = 0;
          toggleHoursColumn();
        }
      });
    }

    function applyViewMode() {
      if (!VIEW_MODE) return;
      document.body.classList.add("view-client", "hours-col-hidden");
      const hint = document.getElementById("footerHint");
      const updated = state.meta?.updated || document.getElementById("updatedAt")?.textContent || "";
      if (hint) {
        hint.textContent = updated
          ? "Режим просмотра · данные от " + updated + " · обновите страницу (F5), если не видите изменений"
          : "Режим просмотра · обновите страницу (F5), если не видите изменений";
      }
    }

    function fillStatusFilter() {
      const current = statusFilterEl.value;
      statusFilterEl.innerHTML = '<option value="">Все статусы</option>';
      STATUS_OPTIONS.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        statusFilterEl.appendChild(opt);
      });
      statusFilterEl.value = current;
    }

    function exportJson() {
      const data = collectData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "реестр_обращений.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const DEFAULT_COLUMNS = JSON.parse(document.getElementById("initial-data").textContent).columns || [];

    function mergeAppealRow(row) {
      const title = String(row["Обращение"] || "").trim();
      const detail = String(row["Описание / суть обращения"] || "").trim();
      let merged = title || detail || "";
      if (title && detail) {
        if (title === detail) merged = title;
        else if (detail.includes(title)) merged = detail;
        else if (title.includes(detail)) merged = title;
        else merged = title + "\n" + detail;
      }
      const out = { ...row };
      out["Обращение"] = merged || null;
      delete out["Описание / суть обращения"];
      return out;
    }

    function normalizeColumns(cols) {
      const list = (cols || DEFAULT_COLUMNS).filter(c => !HIDDEN_COLUMNS.has(c));
      return list.length ? list : DEFAULT_COLUMNS;
    }

    function applyLoadedData(data) {
      if (!Array.isArray(data.appeals)) throw new Error("Нет массива appeals");
      state.meta = data.meta || state.meta || {};
      columns = normalizeColumns(data.columns);
      initiatorOptions = data.initiators || data.meta?.initiators || initiatorOptions;
      state.appeals = data.appeals.map(row => {
        const merged = mergeAppealRow(row);
        const cleaned = emptyRow();
        columns.forEach(col => {
          if (merged[col] !== undefined && merged[col] !== null) cleaned[col] = merged[col];
        });
        return cleaned;
      });
      renderHeader();
      renumber();
      renderRows();
    }

    function loadEmbeddedData() {
      return JSON.parse(document.getElementById("initial-data").textContent);
    }

    async function checkApi() {
      if (VIEW_MODE) return false;
      try {
        const res = await fetch("/api/health", { cache: "no-store" });
        if (!res.ok) return false;
        const data = await res.json();
        return Boolean(data.ok);
      } catch (err) {
        return false;
      }
    }

    function updateApiBanner() {
      if (VIEW_MODE) return;
      const hint = document.getElementById("footerHint");
      const saveBtn = document.getElementById("saveBtn");
      const publishBtn = document.getElementById("publishGithub");
      if (!apiAvailable) {
        if (hint) hint.textContent = "Сохранение недоступно — откройте реестр через ярлык на рабочем столе (open_registry.bat)";
        if (saveBtn) saveBtn.disabled = true;
        if (publishBtn) publishBtn.disabled = true;
        setSaveStatus("Нет связи с сервером", "warn");
      } else if (hint) {
        hint.textContent = "Сохранение → реестр_обращений.json (open_registry.bat)";
      }
    }

    async function loadData() {
      if (VIEW_MODE) return loadEmbeddedData();
      apiAvailable = await checkApi();
      if (!apiAvailable) return loadEmbeddedData();
      try {
        const res = await fetch("/api/data", { cache: "no-store" });
        const ctype = res.headers.get("content-type") || "";
        if (res.ok && ctype.includes("application/json")) return await res.json();
      } catch (err) {
        console.warn("API недоступен, используем встроенные данные", err);
        apiAvailable = false;
      }
      return loadEmbeddedData();
    }

    function setSaveStatus(text, kind = "") {
      saveStatusEl.textContent = text;
      saveStatusEl.className = "save-status" + (kind ? " " + kind : "");
    }

    async function publishForClient() {
      const btn = document.getElementById("publishGithub");
      if (!btn || VIEW_MODE) return;
      btn.disabled = true;
      setSaveStatus("Публикация для клиента…");
      try {
        const res = await fetch("/api/publish-github", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify(collectData()),
        });
        const raw = await res.text();
        let result;
        try {
          result = JSON.parse(raw);
        } catch (parseErr) {
          if (res.status === 404) {
            throw new Error(
              "Сервер устарел (нет API публикации). Закройте окно терминала (Ctrl+C) и снова запустите реестр через ярлык."
            );
          }
          throw new Error("Сервер вернул не JSON. Перезапустите реестр через ярлык.");
        }
        if (!res.ok || !result.ok) {
          throw new Error(result.error || result.warning || "Не удалось опубликовать");
        }
        const url = result.url || CLIENT_PAGES_URL;
        if (result.pushed) {
          setSaveStatus("Опубликовано на GitHub", "ok");
          alert("Реестр опубликован для клиента.\n\n" + url);
        } else {
          setSaveStatus(result.warning ? "Собрано локально" : "Готово", "ok");
          alert((result.warning || "Файлы собраны локально.") + "\n\n" + url);
        }
      } catch (err) {
        setSaveStatus("Ошибка публикации", "err");
        alert("Публикация для клиента не выполнена.\n\n" + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function saveToServer() {
      const btn = document.getElementById("saveBtn");
      if (!await checkApi()) {
        apiAvailable = false;
        updateApiBanner();
        alert("Сервер реестра не отвечает.\n\nЗапустите реестр через ярлык на рабочем столе (open_registry.bat) и снова нажмите «Сохранить».\n\nВаши правки в этой вкладке не пропадут, пока вы её не закроете.");
        return;
      }
      apiAvailable = true;
      btn.disabled = true;
      setSaveStatus("Сохранение…");
      try {
        const res = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify(collectData()),
        });
        const raw = await res.text();
        let result;
        try {
          result = JSON.parse(raw);
        } catch (parseErr) {
          if (res.status === 404) {
            throw new Error("Сервер без API сохранения. Перезапустите реестр через ярлык.");
          }
          throw new Error("Сервер вернул не JSON. Перезапустите реестр через ярлык.");
        }
        if (!res.ok || !result.ok) throw new Error(result.error || "Ошибка сохранения");
        state.meta.updated = result.updated;
        document.getElementById("updatedAt").textContent = result.updated;
        applyLoadedData(await loadData());
        setSaveStatus("Сохранено " + result.updated, "ok");
      } catch (err) {
        apiAvailable = false;
        updateApiBanner();
        setSaveStatus("Ошибка сохранения", "err");
        const msg = (err.message === "Failed to fetch" || err.name === "TypeError")
          ? "Сервер реестра остановился (нет связи с 127.0.0.1:8766).\n\nЗапустите реестр через ярлык на рабочем столе. Окно консоли «Реестр ОПЭ Крокус» должно оставаться открытым."
          : err.message;
        alert("Не удалось сохранить в файл реестр_обращений.json.\n\n" + msg);
      } finally {
        btn.disabled = !apiAvailable;
      }
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          applyLoadedData(JSON.parse(reader.result));
          setSaveStatus("Импортировано, не сохранено");
        } catch (err) {
          alert("Ошибка импорта: " + err.message);
        }
      };
      reader.readAsText(file, "utf-8");
    }

    document.getElementById("addRow").addEventListener("click", () => {
      syncStateFromDom();
      const row = emptyRow();
      row["Статус"] = "Новое";
      state.appeals.push(row);
      renumber();
      renderRows();
    });
    document.getElementById("saveBtn").addEventListener("click", saveToServer);
    document.getElementById("publishGithub")?.addEventListener("click", publishForClient);
    document.getElementById("exportJson").addEventListener("click", exportJson);
    document.getElementById("importJson").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", e => {
      const file = e.target.files?.[0];
      if (file) importJson(file);
      e.target.value = "";
    });
    searchEl.addEventListener("input", applyFilters);
    statusFilterEl.addEventListener("change", applyFilters);
    executorFilterEl.addEventListener("change", applyFilters);

    async function init() {
      try {
        applyHoursColumnVisibility();
        applyLoadedData(await loadData());
        applyViewMode();
        updateApiBanner();
        fillStatusFilter();
        if (apiAvailable) setSaveStatus("");
      } catch (err) {
        alert("Ошибка загрузки реестра: " + err.message);
      }
    }

    init();
  </script>
</body>
</html>
